<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills · IArena</title>
<style>
:root{--bg:#0b0d10;--panel:#14171c;--panel2:#1b1f26;--line:#2a2f38;--text:#f5f6f7;--muted:#9aa1ab;--brand:#ea580c;--ok:#3ecf8e;--sans:system-ui,-apple-system,"Segoe UI",sans-serif;--mono:ui-monospace,"Cascadia Code",Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 var(--sans)}main{max-width:1180px;margin:auto;padding:36px 22px 80px}.top{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}.brand{font:800 13px var(--mono);letter-spacing:.12em;color:var(--brand);text-transform:uppercase}h1{font-size:clamp(30px,5vw,52px);line-height:1;margin:8px 0 12px}.lead{max-width:760px;color:var(--muted);font-size:17px}.back,.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:8px;padding:9px 13px;text-decoration:none;font-weight:700;cursor:pointer}.back:hover,.btn:hover{border-color:var(--brand);color:var(--brand)}.controls{display:flex;gap:9px;flex-wrap:wrap;margin:26px 0}.filter.active{background:var(--brand);border-color:var(--brand);color:#16110c}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:12px}.card.recommended{border-color:#ea580c66}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.head h2{font-size:18px;margin:0}.pill{font:700 10px var(--mono);text-transform:uppercase;letter-spacing:.05em;border:1px solid currentColor;border-radius:99px;padding:3px 8px;color:var(--muted)}.pill.criação{color:#a78bfa}.pill.marca{color:var(--brand)}.pill.qualidade{color:var(--ok)}.pill.síntese{color:#60a5fa}.pill.controle{color:#fbbf24}.pill.meta{color:#f472b6}.pill.acabamento{color:#fb923c}.source{font:600 12px var(--mono);color:var(--muted)}p{margin:0}.notes{color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}.actions .btn.primary{background:var(--brand);border-color:var(--brand);color:#16110c}.command{font:12px/1.5 var(--mono);background:#080a0d;border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto;color:#d9dde3}.status{min-height:22px;color:var(--muted);margin:16px 0}code{font-family:var(--mono)}@media(max-width:560px){main{padding:24px 14px 60px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body><main>
<div class="top"><div><div class="brand">IArena · catálogo compartilhável</div><h1>Skills de design e frontend</h1><p class="lead">Escolha a variável da competição, copie o link ou o comando e mantenha o mesmo brief para todos. Skills de qualidade entram depois da geração.</p></div><a class="back" href="/">← Competições</a></div>
<div class="controls" id="filters"></div><div class="status" id="status">Carregando catálogo…</div><section class="grid" id="grid"></section>
</main>
<script>
const grid=document.getElementById('grid'),filters=document.getElementById('filters'),status=document.getElementById('status');let all=[],active='todos';
function commandFor(s){return s.url?`npx skills use ${s.url} --agent claude-code`:'Use o mesmo prompt sem carregar nenhuma skill.'}
function button(label,fn,primary=false){const b=document.createElement('button');b.className='btn'+(primary?' primary':'');b.textContent=label;b.onclick=fn;return b}
async function copy(text){await navigator.clipboard.writeText(text);status.textContent='Copiado: '+text;setTimeout(()=>status.textContent='',2200)}
function render(){grid.replaceChildren();const list=active==='todos'?all:all.filter(s=>s.role===active);status.textContent=`${list.length} opção(ões) · ${active}`;for(const s of list){const c=document.createElement('article');c.className='card'+(s.recommended?' recommended':'');const head=document.createElement('div');head.className='head';const title=document.createElement('div');const h=document.createElement('h2');h.textContent=s.name;const src=document.createElement('div');src.className='source';src.textContent=s.source;title.append(h,src);const pill=document.createElement('span');pill.className='pill '+s.role;pill.textContent=s.role;head.append(title,pill);const best=document.createElement('p');best.textContent=s.best_for;const notes=document.createElement('p');notes.className='notes';notes.textContent=s.notes;const cmd=document.createElement('div');cmd.className='command';cmd.textContent=commandFor(s);const actions=document.createElement('div');actions.className='actions';actions.append(button('Copiar comando',()=>copy(commandFor(s)),true));if(s.url){const link=document.createElement('a');link.className='btn';link.href=s.url;link.target='_blank';link.rel='noreferrer';link.textContent='Abrir skill';actions.append(link)}c.append(head,best,notes,cmd,actions);grid.append(c)}}
fetch('/skills.json').then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(data=>{all=data.skills||[];const roles=['todos',...new Set(all.map(s=>s.role))];for(const role of roles){const b=button(role,()=>{active=role;document.querySelectorAll('.filter').forEach(x=>x.classList.toggle('active',x.dataset.role===role));render()});b.classList.add('filter');b.dataset.role=role;if(role==='todos')b.classList.add('active');filters.append(b)}render()}).catch(err=>status.textContent='Falha ao carregar skills.json: '+err.message);
</script></body></html>
