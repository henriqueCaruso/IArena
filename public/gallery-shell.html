<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ITEM_TITLE}} · {{GROUP_TITLE}} · IArena</title>
<style>
:root{
  --bg:#0b0d10; --panel:#14171c; --panel2:#1b1f26; --line:#2a2f38;
  --txt:#e8eaed; --muted:#9aa1ab; --accent:#6d5bff; --accent-soft:#6d5bff22;
  --sans:system-ui,-apple-system,"Segoe UI",sans-serif; --mono:ui-monospace,"Cascadia Code",Consolas,monospace; --disp:var(--sans);
}
@media (prefers-color-scheme: light){
  :root{ --bg:#f7f7f9; --panel:#fff; --panel2:#f0f0f3; --line:#e2e2e8; --txt:#16181d; --muted:#6b7280; }
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--txt);font:16px/1.5 var(--sans);display:flex;flex-direction:column}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
header .brand{font:800 15px var(--disp);color:var(--accent);letter-spacing:.08em}
header h1{font:700 16px var(--disp);margin:0;flex:0 0 auto;white-space:nowrap}
.chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:120px}
.chip{font:600 11px var(--mono);color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:3px 10px;white-space:nowrap}
.chip.variant{color:var(--accent);border-color:var(--accent)}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 12px;font:600 12.5px var(--sans);cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.1);color:#fff}
.btn.back{background:none;border-color:var(--line);color:var(--muted)}
main{flex:1;min-height:0;position:relative}
main iframe{width:100%;height:100%;border:none;display:block;background:#fff}
#fab{position:fixed;display:none;z-index:90;background:var(--accent);color:#fff;border:none;border-radius:99px;padding:7px 14px;font:700 13px var(--sans);cursor:pointer;box-shadow:0 6px 20px #0009}
#panel{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;background:var(--panel);border-left:1px solid var(--line);z-index:80;transition:right .25s;display:flex;flex-direction:column}
#panel.open{right:0}
#panel .ph{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
#panel .ph b{font:700 15px var(--disp);flex:1}
#list{flex:1;overflow-y:auto;padding:14px 20px}
.com{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px}
.com.resolved{opacity:.45}
.com .cq{font-size:12.5px;color:var(--muted);border-left:2px solid var(--accent);padding-left:10px;margin-bottom:6px;font-style:italic}
.com .cel{font:11px var(--mono);color:var(--accent);margin-bottom:4px;opacity:.85}
.com .ct{font-size:14px;white-space:pre-wrap}
.com .cm{display:flex;gap:10px;margin-top:8px;font-size:12px}
.com .cm span{color:var(--muted);flex:1;font-family:var(--mono);font-size:11px}
.com .cm button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0}
.com .cm button:hover{color:var(--accent)}
#panel .pf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}
#dlg{position:fixed;z-index:95;inset:0;background:#000a;display:none;align-items:center;justify-content:center}
#dlg.open{display:flex}
#dlg .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:520px;max-width:92vw;padding:20px 22px}
#dlg .box .dq{font-size:13px;color:var(--muted);border-left:2px solid var(--accent);padding-left:10px;margin-bottom:10px;max-height:90px;overflow:hidden;font-style:italic}
#dlg textarea{width:100%;min-height:110px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font:14px var(--sans);padding:10px;resize:vertical}
#dlg .db{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font:600 13.5px var(--sans);border-radius:99px;padding:9px 22px;display:none;z-index:99;box-shadow:0 6px 24px #000a}
.hintbar{background:var(--accent-soft);border-bottom:1px dashed var(--accent);padding:6px 20px;font-size:12px;color:var(--txt);flex-shrink:0}
@media print{ header,#fab,#panel,#dlg,.hintbar{display:none!important} }
</style>
</head>
<body data-doc-id="{{FILE}}">
<script type="application/json" id="groupItems">{{ITEMS_JSON}}</script>
<header>
  <span class="brand">IArena</span>
  <h1>{{ITEM_TITLE}}</h1>
  <div class="chips">
    <span class="chip variant">{{VARIANT}}</span>
    <span class="chip">{{INDEX}}/{{TOTAL}}</span>
  </div>
  {{PREV_BTN}}
  {{NEXT_BTN}}
  <a class="btn back" href="/" title="back to index">← index</a>
  <button class="btn" id="bElement" title="click anywhere in the entry to comment, even without selectable text">🎯 Element</button>
  <button class="btn" id="bGeneral" title="leave a general comment about the whole page — no selection or click needed">📝 General note</button>
  <button class="btn" id="bPanel">💬 Comments (<span id="nCom">0</span>)</button>
  <button class="btn primary" id="bCopy">📋 Copy</button>
  <button class="btn primary" id="bCopyGroup">📋 Copy ALL ({{COPY_TOTAL}})</button>
</header>
<div class="hintbar">💡 Select text inside the entry, or toggle 🎯 Element and click anything (icon, image, empty area). <b>{{GROUP_TITLE}}</b> — item {{INDEX}} of {{TOTAL}}.</div>

<main>
  <iframe id="entryFrame" src="/{{FILE}}" title="{{ITEM_TITLE}}"></iframe>
</main>

<button id="fab">💬 Comment</button>

<div id="panel">
  <div class="ph"><b>Comments</b><button class="btn" id="bClose">✕</button></div>
  <div id="list"></div>
  <div class="pf">
    <button class="btn primary" id="bCopy2">📋 Copy</button>
  </div>
</div>

<div id="dlg">
  <div class="box">
    <div class="dq" id="dlgQuote"></div>
    <textarea id="dlgText" placeholder="Your comment..."></textarea>
    <div class="db">
      <button class="btn" id="dlgCancel">Cancel</button>
      <button class="btn primary" id="dlgSave">Save (Ctrl+Enter)</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  var DOC = document.body.getAttribute('data-doc-id') || 'doc';
  var API = '/api';
  var DRAFTK = 'arena-draft:' + DOC;
  var sel = {quote:'', anchor:''};
  var COMMENTS = [];

  function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(function(){t.style.display='none';},2200); }

  // readable path of the selected element: tag + label (own short text, class, or id) — up to 4 levels.
  // disambiguates repeated text (e.g. a label that appears as both a heading and a nav item).
  function friendlySelector(el){
    if (!el || el.nodeType !== 1) return '';
    var parts = [], cur = el, depth = 0;
    while (cur && cur.tagName && cur !== document.body && depth < 4) {
      var tag = cur.tagName.toLowerCase();
      if (tag === 'html' || tag === 'body') break;
      var label = '';
      var ownText = Array.prototype.slice.call(cur.childNodes)
        .filter(function(n){ return n.nodeType === 3 && n.textContent.trim(); })
        .map(function(n){ return n.textContent.trim(); }).join(' ');
      if (ownText && ownText.length <= 42) { label = '"' + ownText + '"'; }
      else if (cur.className && typeof cur.className === 'string' && cur.className.trim()) { label = '.' + cur.className.trim().split(/\s+/).slice(0, 2).join('.'); }
      else if (cur.id) { label = '#' + cur.id; }
      parts.unshift(label ? (tag + '(' + label + ')') : tag);
      cur = cur.parentElement;
      depth++;
    }
    return parts.join(' › ');
  }
  function describeElement(el){
    if (!el) return '';
    var text = (el.innerText || el.textContent || '').trim();
    if (text) return text.length <= 200 ? text : text.substring(0,200) + '…';
    if (el.tagName === 'IMG') return '[image' + (el.alt ? ': ' + el.alt : ' no alt') + ']';
    var bg = ''; try { bg = el.ownerDocument.defaultView.getComputedStyle(el).backgroundColor; } catch(e){}
    var withBg = (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') ? (', bg ' + bg) : '';
    return '[element ' + (el.tagName ? el.tagName.toLowerCase() : '?') + withBg + ', no text]';
  }

  var frame = document.getElementById('entryFrame');
  var elementMode = false;
  var hovered = null;
  function openDialog(){
    document.getElementById('fab').style.display='none';
    document.getElementById('dlgQuote').textContent = sel.quote ? ('"' + sel.quote + '"') : '(general note — no specific element selected)';
    dlgText.value = localStorage.getItem(DRAFTK) || ''; dlg.classList.add('open'); dlgText.focus();
  }
  function armSelection(win, doc, frameRect){
    doc.addEventListener('mouseup', function(){
      if (elementMode) return;
      setTimeout(function(){
        var s = win.getSelection(); var txt = s ? s.toString().trim() : '';
        var fab = document.getElementById('fab');
        if (txt.length > 2 && txt.length < 1200){
          var r = s.getRangeAt(0).getBoundingClientRect();
          var node = s.anchorNode; var el = node && node.nodeType === 3 ? node.parentElement : node;
          sel.quote = txt; sel.anchor = friendlySelector(el);
          fab.style.display='block'; fab.style.position='fixed';
          fab.style.left = Math.min(window.innerWidth-130, Math.max(8, frameRect.left + r.left + r.width/2 - 50)) + 'px';
          fab.style.top  = Math.max(60, frameRect.top + r.bottom + 8) + 'px';
        } else { fab.style.display='none'; }
      }, 10);
    });
    doc.addEventListener('mousemove', function(e){
      if (!elementMode) return;
      var el = e.target;
      if (el === hovered) return;
      if (hovered) hovered.style.outline = '';
      hovered = el;
      if (hovered && hovered !== doc.body && hovered !== doc.documentElement) hovered.style.outline = '2px solid #6d5bff';
    });
    doc.addEventListener('click', function(e){
      if (!elementMode) return;
      e.preventDefault(); e.stopPropagation();
      var el = e.target;
      if (hovered) { hovered.style.outline = ''; hovered = null; }
      sel.quote = describeElement(el); sel.anchor = friendlySelector(el);
      openDialog();
    }, true);
  }
  frame.addEventListener('load', function(){
    try {
      var win = frame.contentWindow, doc = frame.contentDocument;
      if (win && doc) armSelection(win, doc, frame.getBoundingClientRect());
    } catch(e){ /* cross-origin — shouldn't happen when same-origin, but don't crash the page */ }
  });
  window.addEventListener('resize', function(){ document.getElementById('fab').style.display='none'; });

  var bElement = document.getElementById('bElement');
  bElement.addEventListener('click', function(){
    elementMode = !elementMode;
    bElement.classList.toggle('primary', elementMode);
    bElement.textContent = elementMode ? '🎯 Element (active — click the entry)' : '🎯 Element';
    try {
      var doc = frame.contentDocument;
      if (doc && doc.body) doc.body.style.cursor = elementMode ? 'crosshair' : '';
      if (!elementMode && hovered) { hovered.style.outline = ''; hovered = null; }
    } catch(e){}
  });

  var bGeneral = document.getElementById('bGeneral');
  bGeneral.addEventListener('click', function(){
    sel.quote = ''; sel.anchor = 'general';
    openDialog();
  });

  var dlg = document.getElementById('dlg'), dlgText = document.getElementById('dlgText');
  document.getElementById('fab').addEventListener('click', openDialog);
  function closeDlg(){ dlg.classList.remove('open'); }
  document.getElementById('dlgCancel').addEventListener('click', closeDlg);
  dlg.addEventListener('click', function(e){ if(e.target===dlg){ if(dlgText.value.trim() && !confirm('Discard the comment? (kept as a draft)')) return; closeDlg(); } });

  function saveComment(){
    var txt = dlgText.value.trim(); if (!txt){ closeDlg(); return; }
    localStorage.removeItem(DRAFTK);
    fetch(API + '/comments/' + encodeURIComponent(DOC), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ section:sel.anchor, quote:sel.quote, text:txt })
    }).then(function(r){ return r.json(); })
      .then(function(){ closeDlg(); loadComments(); toast('💬 Comment saved'); })
      .catch(function(){ toast('Error saving comment'); });
  }
  document.getElementById('dlgSave').addEventListener('click', saveComment);
  dlgText.addEventListener('keydown', function(e){ if(e.ctrlKey && e.key==='Enter') saveComment(); });
  dlgText.addEventListener('input', function(){ localStorage.setItem(DRAFTK, dlgText.value); });

  var panel = document.getElementById('panel');
  document.getElementById('bPanel').addEventListener('click', function(){ panel.classList.toggle('open'); });
  document.getElementById('bClose').addEventListener('click', function(){ panel.classList.remove('open'); });

  function loadComments(cb){
    fetch(API + '/comments/' + encodeURIComponent(DOC)).then(function(r){return r.json();})
      .then(function(arr){ COMMENTS = Array.isArray(arr)?arr:[]; render(); if(cb)cb(); })
      .catch(function(){ if(cb)cb(); });
  }
  function render(){
    var arr = COMMENTS;
    document.getElementById('nCom').textContent = arr.filter(function(c){return !c.resolved;}).length;
    var html = '';
    if (!arr.length) html = '<p style="font-size:13.5px;color:var(--muted)">No comments yet. Select text, or use 🎯 Element.</p>';
    arr.slice().reverse().forEach(function(c, _i){
      var realIdx = arr.length - 1 - _i;
      var time = c.ts ? String(c.ts).substring(11,16) : '';
      var text = c.text || '';
      var anchor = c.section || '';
      html += '<div class="com'+(c.resolved?' resolved':'')+'">'
        + (anchor?'<div class="cel">📍 '+esc(anchor)+'</div>':'')
        + (c.quote?'<div class="cq">'+esc(c.quote.length>140?c.quote.substring(0,140)+'…':c.quote)+'</div>':'')
        + '<div class="ct">'+esc(text)+'</div>'
        + '<div class="cm"><span>'+time+'</span>'
        + '<button data-action="resolve" data-idx="'+realIdx+'">'+(c.resolved?'resolved':'resolve')+'</button></div></div>';
    });
    document.getElementById('list').innerHTML = html;
  }
  document.getElementById('list').addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    if (b.getAttribute('data-action')==='resolve'){
      var idx = parseInt(b.getAttribute('data-idx'),10);
      fetch(API + '/comments/' + encodeURIComponent(DOC) + '/' + idx, {method:'DELETE'})
        .then(function(){ loadComments(); }).catch(function(){ toast('error'); });
    }
  });

  function generateMd(){
    var open = COMMENTS.filter(function(c){return !c.resolved;});
    var md = '## Comments on "{{ITEM_TITLE}}" ('+open.length+' open)\n\n';
    if (!open.length) md += '(no open comments)\n';
    open.forEach(function(c,i){
      md += (i+1)+'. "'+(c.quote||'').replace(/\s+/g,' ').substring(0,220)+'"\n   → '+(c.text||'')+'\n\n';
    });
    return md;
  }
  function copy(){
    var md = generateMd();
    function ok(){ toast('📋 Copied!'); }
    if (navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(ok, fallback); } else fallback();
    function fallback(){ var ta=document.createElement('textarea'); ta.value=md; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); ok(); }catch(e){ alert(md); } document.body.removeChild(ta); }
  }
  document.getElementById('bCopy').addEventListener('click', copy);
  document.getElementById('bCopy2').addEventListener('click', copy);

  // copy ALL open comments across every item in the group (not just this page)
  function groupItems(){
    try { return JSON.parse(document.getElementById('groupItems').textContent || '[]'); } catch(e){ return []; }
  }
  function copyGroup(){
    var items = groupItems();
    if (!items.length) { toast('empty group'); return; }
    Promise.all(items.map(function(it){
      return fetch(API + '/comments/' + encodeURIComponent(it.file)).then(function(r){ return r.json(); })
        .then(function(arr){ return { item: it, comments: Array.isArray(arr) ? arr.filter(function(c){ return !c.resolved; }) : [] }; })
        .catch(function(){ return { item: it, comments: [] }; });
    })).then(function(perItem){
      var total = perItem.reduce(function(n,p){ return n + p.comments.length; }, 0);
      var md = '## Comments for group "{{GROUP_TITLE}}" (' + total + ' open, ' + items.length + ' pages)\n\n';
      perItem.forEach(function(p){
        if (!p.comments.length) return;
        md += '### ' + p.item.title + (p.item.variant ? ' — ' + p.item.variant : '') + '\n\n';
        p.comments.forEach(function(c, i){
          md += (i+1) + '. ' + (c.section ? '[' + c.section + '] ' : '') + '"' + (c.quote||'').replace(/\s+/g,' ').substring(0,220) + '"\n   → ' + (c.text||'') + '\n\n';
        });
      });
      if (!total) md += '(no open comments anywhere)\n';
      function ok(){ toast('📋 ' + total + ' comment(s) from ' + items.length + ' page(s) copied!'); }
      if (navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(ok, fallback); } else fallback();
      function fallback(){ var ta=document.createElement('textarea'); ta.value=md; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); ok(); }catch(e){ alert(md); } document.body.removeChild(ta); }
    });
  }
  document.getElementById('bCopyGroup').addEventListener('click', copyGroup);

  document.addEventListener('keydown', function(e){
    if (e.target && /input|textarea/i.test(e.target.tagName)) return;
    if (e.key === 'ArrowLeft'){ var p = document.querySelector('a[data-nav="prev"]'); if(p) p.click(); }
    if (e.key === 'ArrowRight'){ var n = document.querySelector('a[data-nav="next"]'); if(n) n.click(); }
  });

  loadComments();
})();
</script>
</body>
</html>
