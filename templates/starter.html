<!-- Template econômico IArena: altere tokens e áreas marcadas; evite reescrever boilerplate. -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- PREENCHER --></title>
<style>
:root{--accent:#6d5bff;--bg:#0b0d10;--panel:#14171c;--panel2:#1b1f26;--line:#2a2f38;--ink:#f5f6f7;--muted:#9aa1ab;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--sans:system-ui,-apple-system,"Segoe UI",sans-serif;--mono:ui-monospace,"Cascadia Code",Consolas,monospace;--radius:12px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.5 var(--sans);padding:32px 24px 80px}.wrap{max-width:1120px;margin:auto}header{margin-bottom:28px}.eyebrow{font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}h1{font-size:clamp(28px,5vw,44px);line-height:1.05;margin:8px 0}.muted{color:var(--muted)}.stats,.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:24px 0}.card,.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}.stat strong{display:block;font-size:28px}table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line)}th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}th{background:var(--panel2);font:700 11px var(--mono);color:var(--muted);text-transform:uppercase}.btn{display:inline-block;border:0;border-radius:8px;padding:10px 16px;background:var(--accent);color:white;font-weight:700;text-decoration:none;cursor:pointer}:focus-visible{outline:3px solid color-mix(in srgb,var(--accent),white 25%);outline-offset:3px}@media(max-width:700px){body{padding:20px 14px}table{display:block;overflow:auto}}
</style>
</head>
<body><div class="wrap">
<header><span class="eyebrow"><!-- PREENCHER --></span><h1><!-- PREENCHER --></h1><p class="muted"><!-- PREENCHER --></p></header>
<section class="stats"><div class="stat"><strong>—</strong><span class="muted">Métrica</span></div><div class="stat"><strong>—</strong><span class="muted">Métrica</span></div></section>
<section class="cards"><article class="card"><h2>Bloco principal</h2><p class="muted">Substitua pelo conteúdo real do brief.</p></article><article class="card"><h2>Próxima ação</h2><a class="btn" href="#">Ação principal</a></article></section>
<table><thead><tr><th>Item</th><th>Informação</th><th>Status</th><th>Ação</th></tr></thead><tbody><tr><td>Exemplo</td><td>Valor real</td><td>Revisar</td><td><button class="btn">Abrir</button></td></tr></tbody></table>
</div></body></html>
