<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- FILL: produto · BR Supply --></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1118;--panel:#121a25;--panel2:#18222f;--line:#243245;--txt:#e3ebf4;--muted:#93a4b8;--muted2:#6f819a;--orange:#FF782D;--orange-soft:#ff782d22;--ok:#3ecf8e;--warn:#f5b942;--bad:#ef5b6b;--sans:'Hanken Grotesk','Segoe UI',system-ui,sans-serif;--disp:'Archivo','Segoe UI',system-ui,sans-serif;--mono:'JetBrains Mono',Consolas,monospace}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,#13202e 0%,var(--bg) 60%);color:var(--txt);font:16px/1.6 var(--sans)}
header{display:flex;align-items:center;gap:14px;padding:14px 28px;border-bottom:1px solid var(--line);background:#0c1118ee;backdrop-filter:blur(6px);flex-wrap:wrap}.brand{font:800 15px var(--disp);color:var(--orange);letter-spacing:.12em}.title{font:800 26px var(--disp);margin:0;flex:1}.meta{font:12px var(--mono);color:var(--muted)}
main{max-width:1180px;margin:auto;padding:28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px}.card{transition:.16s}.card:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 10px 30px #0006}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 14px;font:600 13px var(--sans);cursor:pointer}.btn.primary{background:var(--orange);border-color:var(--orange);color:#16110c}.badge{display:inline-block;font:600 11px var(--mono);border-radius:99px;padding:2px 9px;border:1px solid var(--line);color:var(--muted)}.badge.ok{color:var(--ok);border-color:var(--ok)}.badge.warn{color:var(--warn);border-color:var(--warn)}.badge.bad{color:var(--bad);border-color:var(--bad)}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);margin-top:18px}th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}th{font:600 11px var(--mono);color:var(--muted);text-transform:uppercase;background:var(--panel2)}
@media(max-width:760px){header,main{padding:18px}table{display:block;overflow-x:auto}}
</style>
</head>
<body>
<header><span class="brand">BRS·IA</span><h1 class="title"><!-- FILL: produto --></h1><span class="meta"><!-- FILL: contexto --></span></header>

</html>
