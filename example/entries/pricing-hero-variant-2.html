<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loop — Pricing (Variant 2)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#ff6ec4,#7873f5 60%,#4ADEDE);font-family:"Comic Sans MS",system-ui,sans-serif;color:#fff;padding:40px}
  .card{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.4);border-radius:32px;padding:56px;text-align:center;max-width:520px}
  h1{font-size:56px;font-weight:900}
  p{font-size:19px;opacity:.95;margin:16px 0 32px}
  button{background:#fff;color:#7873f5;border:none;padding:16px 40px;font-size:17px;font-weight:800;border-radius:999px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .badge{display:inline-block;background:#fff;color:#ff6ec4;border-radius:999px;padding:4px 14px;font-size:12px;font-weight:800;margin-bottom:16px}
</style>
</head>
<body>
  <div class="card">
    <span class="badge">✨ NEW</span>
    <h1>Loop 🔁</h1>
    <p>The friendliest way to ship your product. Loved by 10,000+ happy teams!</p>
    <button>Let's go! →</button>
  </div>
</body>
</html>
