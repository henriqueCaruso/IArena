<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loop — Pricing (Variant 1)</title>
<style>
  :root{ --bg:#0a0a0a; --ink:#f5f5f5; --muted:#8a8a8a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Helvetica Neue",Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
  h1{font-size:clamp(48px,10vw,120px);font-weight:800;letter-spacing:-.04em;line-height:.95;margin-bottom:24px}
  p{font-size:20px;color:var(--muted);max-width:520px;margin:0 auto 36px}
  button{background:var(--ink);color:var(--bg);border:none;padding:16px 36px;font-size:16px;font-weight:700;border-radius:2px;cursor:pointer}
  .price{margin-top:48px;font-size:14px;color:var(--muted)}
</style>
</head>
<body>
  <div>
    <h1>Loop</h1>
    <p>Ship faster with less overhead. One flat price. No surprises.</p>
    <button>Start free trial</button>
    <div class="price">$29/month · cancel anytime</div>
  </div>
</body>
</html>
